name: Publish to crates.io

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].version')
          NAME=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].name')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Cargo.toml has $NAME v$VERSION"

      - name: Check if version is already published
        id: check
        run: |
          NAME="${{ steps.version.outputs.name }}"
          VERSION="${{ steps.version.outputs.version }}"
          RESPONSE=$(mktemp)
          HTTP=$(curl -sS -A "moose-cli-publish-workflow" \
            -o "$RESPONSE" -w '%{http_code}' \
            "https://crates.io/api/v1/crates/$NAME" || echo "000")
          echo "crates.io API returned HTTP $HTTP"
          if [ "$HTTP" = "200" ] && jq -e --arg v "$VERSION" \
               '.versions[]?.num | select(. == $v)' "$RESPONSE" >/dev/null; then
            echo "v$VERSION is already on crates.io — skipping publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          elif [ "$HTTP" = "404" ] || [ "$HTTP" = "200" ]; then
            echo "v$VERSION is new — will publish."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "crates.io API unreachable (HTTP $HTTP) — försöker publicera ändå."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        if: steps.check.outputs.should_publish == 'true'
        run: cargo test --locked

      - name: Publish to crates.io
        id: publish
        if: steps.check.outputs.should_publish == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set +e
          OUTPUT=$(cargo publish --locked --token "$CARGO_REGISTRY_TOKEN" 2>&1)
          STATUS=$?
          echo "$OUTPUT"
          if [ "$STATUS" -ne 0 ]; then
            if echo "$OUTPUT" | grep -q "already exists on crates.io"; then
              echo "Version finns redan på crates.io — behandlar som success."
              echo "published=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            exit "$STATUS"
          fi
          echo "published=true" >> "$GITHUB_OUTPUT"

      - name: Tag the release
        if: steps.publish.outputs.published == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag "v$VERSION"
          git push origin "v$VERSION"
